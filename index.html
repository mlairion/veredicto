<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veredicto</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;
  --border:#2a2a2a;--border2:#333;--border3:#3a3a3a;
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --accent:#3483fa;--accent-dark:#2a6fd4;
  --best:#22c55e;--best-bg:#0a1f12;
  --red:#f87171;--red-bg:#1f0a0a;
  --yellow:#ffe400;
  --sidebar:240px;
  --radius:8px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
body.light{
  --bg:#f4f5f7;--bg2:#ffffff;--bg3:#f0f1f3;--bg4:#e4e5e8;
  --border:#e0e0e0;--border2:#d0d0d0;--border3:#c0c0c0;
  --text:#111;--text2:#555;--text3:#aaa;
  --best-bg:#e8fdf0;--red-bg:#fdf0f0;
}
.btn-theme{background:none;border:none;cursor:pointer;font-size:16px;padding:4px 6px;border-radius:var(--radius);color:var(--text2);transition:color .1s}
.btn-theme:hover{color:var(--text)}

/* ── LAYOUT ─────────────────────────────────────────────────────── */
body{background:var(--bg);color:var(--text);display:flex;min-height:100vh}

.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;
}
.main{flex:1;margin-left:var(--sidebar);display:flex;flex-direction:column;min-height:100vh}

/* ── SIDEBAR ─────────────────────────────────────────────────────── */
.sb-header{
  padding:14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.sb-logo{display:flex;align-items:center;gap:8px}
.logo{background:var(--yellow);color:#111;font-size:12px;font-weight:800;padding:3px 8px;border-radius:5px}
.brand{font-size:15px;font-weight:600}

.sb-user{
  padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.user-info{display:flex;align-items:center;gap:8px}
.user-avatar{
  width:28px;height:28px;border-radius:50%;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;
}
.user-email{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-logout{font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:inherit;margin-left:auto;flex-shrink:0}
.btn-logout:hover{color:var(--red)}

.sb-section{padding:10px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-section-hd{
  padding:4px 14px 6px;
  display:flex;align-items:center;justify-content:space-between;
  font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;
}
.btn-new-proj{
  background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:18px;line-height:1;padding:0 2px;
  transition:color .1s;
}
.btn-new-proj:hover{color:var(--accent)}

.proj-item{
  padding:7px 14px;cursor:pointer;display:flex;align-items:center;gap:7px;
  transition:background .1s;border-radius:0;
}
.proj-item:hover{background:var(--bg3)}
.proj-item.active{background:rgba(52,131,250,.1);border-right:2px solid var(--accent)}
.proj-name{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-count{font-size:10px;background:var(--bg4);color:var(--text2);padding:1px 6px;border-radius:10px;flex-shrink:0}
.proj-item.active .proj-name{color:var(--accent)}
.proj-chevron{font-size:10px;color:var(--text3);transition:transform .15s;flex-shrink:0}
.proj-chevron.open{transform:rotate(90deg)}
.proj-products{padding:0 14px 6px 28px;display:none}
.proj-products.open{display:block}
.proj-prod-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px;color:var(--text2);cursor:pointer}
.proj-prod-item:hover{color:var(--text)}
.proj-prod-item input[type=checkbox]{accent-color:var(--accent);flex-shrink:0}

.sb-nav{padding:6px 0;flex-shrink:0}
.nav-item{
  width:100%;padding:9px 14px;background:none;border:none;
  color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer;
  text-align:left;display:flex;align-items:center;gap:8px;transition:all .1s;
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{color:var(--accent)}

.sb-footer{margin-top:auto;border-top:1px solid var(--border);padding:6px 0;flex-shrink:0}

/* ── TOPBAR ──────────────────────────────────────────────────────── */
.topbar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:12px 20px;display:flex;align-items:center;justify-content:space-between;
  gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50;flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:16px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn-hamburger{
  display:none;background:none;border:none;color:var(--text2);
  font-size:20px;cursor:pointer;padding:2px 6px;
}

/* ── CONTENT ─────────────────────────────────────────────────────── */
#content{flex:1;padding:20px;overflow-x:auto}

/* ── FILTER BAR ──────────────────────────────────────────────────── */
.filter-group{
  display:flex;align-items:center;gap:6px;
  background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:5px 10px;
}
.filter-group label{font-size:11px;color:var(--text2);white-space:nowrap}
.filter-input{
  width:80px;background:none;border:none;color:var(--text);
  font-size:12px;font-family:inherit;outline:none;
}
.filter-input::placeholder{color:var(--text3)}
.filter-sep{color:var(--text3);font-size:12px}

/* ── BUTTONS ─────────────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:var(--radius);border:none;
  font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .1s;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
.btn-secondary:hover{color:var(--text);border-color:#555}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}

.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── COMPARISON TABLE ────────────────────────────────────────────── */
.cmp-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 0}
.cmp-table{border-collapse:separate;border-spacing:0 0;width:100%;table-layout:fixed}
.col-spec{
  position:sticky;left:0;background:var(--bg2);border-right:1px solid var(--border2);z-index:10;
  width:150px;min-width:150px;max-width:150px;padding:9px 13px;font-size:12px;color:var(--text2);text-align:left;
}
.col-spec.hd{background:var(--bg);border-bottom:1px solid var(--border2);vertical-align:bottom;padding-bottom:10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.col-product{
  width:210px;min-width:210px;max-width:210px;padding:12px;vertical-align:top;
  border-left:1px solid var(--border2);border-top:1px solid var(--border2);
  background:var(--bg2);
}
.col-product:first-of-type{border-left:none}
.product-header{display:flex;flex-direction:column;gap:6px}
.product-img{width:80px;height:80px;object-fit:contain;border-radius:8px;background:#fff;padding:4px;align-self:center}
.product-img-ph{width:80px;height:80px;background:var(--bg3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;align-self:center}
.product-name{font-size:12px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.product-price{font-size:15px;font-weight:700}
.product-price.best{color:var(--best)}
.product-price.worst{color:var(--red)}
.product-rating{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:3px}
.star{color:var(--yellow)}
.product-actions{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.btn-link{font-size:11px;color:var(--accent);text-decoration:none;padding:3px 7px;border:1px solid var(--accent);border-radius:4px;transition:all .1s}
.btn-link:hover{background:var(--accent);color:#fff}
.btn-remove{font-size:11px;color:var(--text3);background:none;border:1px solid var(--border2);border-radius:4px;padding:3px 7px;cursor:pointer;font-family:inherit;transition:all .1s}
.btn-remove:hover{color:var(--red);border-color:var(--red)}
.cmp-table tbody tr{border-bottom:1px solid var(--border)}
.col-value{padding:9px 13px;font-size:12px;color:var(--text);border-left:1px solid var(--border2);vertical-align:middle}
.col-value:first-of-type{border-left:none}
.col-value.best-val{background:var(--best-bg);color:var(--best);font-weight:600}
.col-value.muted{color:var(--text3)}
.col-value.empty{color:var(--text3);font-style:italic}
tr.row-sep{height:0}
tr.row-sep td{padding:0;border:none;background:var(--bg);font-size:10px;color:var(--text3);padding:8px 13px 3px;text-transform:uppercase;letter-spacing:.6px}
tr.row-key .col-spec{color:var(--text);font-weight:500}

/* ── EMPTY STATES ────────────────────────────────────────────────── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;text-align:center;gap:10px}
.empty-icon{font-size:48px}
.empty h2{font-size:17px;font-weight:600}
.empty p{font-size:13px;color:var(--text2);line-height:1.6;max-width:340px}

/* ── MODAL ───────────────────────────────────────────────────────── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:300;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border2);border-radius:12px;
  width:100%;padding:20px;max-height:90vh;overflow-y:auto;
}
.modal-sm{max-width:380px}
.modal-md{max-width:520px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-hd h2{font-size:15px;font-weight:600}
.btn-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1;padding:2px}
.btn-close:hover{color:var(--text)}

.tabs-hd{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab-btn{
  padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;
  background:none;border:none;color:var(--text3);font-family:inherit;
  border-bottom:2px solid transparent;transition:all .15s;
}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}
.tab-panel{display:none}
.tab-panel.active{display:block}

.frow{margin-bottom:12px}
.frow label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px}
.frow input,.frow textarea,.frow select{
  width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);
  font-size:13px;background:var(--bg3);color:var(--text);font-family:inherit;
}
.frow input:focus,.frow textarea:focus,.frow select:focus{outline:none;border-color:var(--accent)}
.frow .hint{font-size:10px;color:var(--text3);margin-top:4px;line-height:1.5}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow textarea{resize:vertical;min-height:70px}

.status-msg{font-size:12px;margin-top:8px;min-height:16px}
.status-msg.ok{color:var(--best)}
.status-msg.err{color:var(--red)}

.product-preview-card{
  background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);
  padding:12px;margin-bottom:12px;display:none;
}
.pcard-title{font-size:13px;font-weight:500;margin-bottom:4px;line-height:1.4}
.pcard-price{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:3px}
.pcard-rating{font-size:11px;color:var(--text2);margin-bottom:6px}
.pcard-specs{font-size:11px;color:var(--text2);line-height:1.8;max-height:120px;overflow-y:auto}
.pcard-specs span{color:var(--text)}

/* ── INSTRUCCIONES / GLOSARIO / AJUSTES ──────────────────────────── */
.page-content{max-width:640px}
.page-content h2{font-size:18px;font-weight:600;margin-bottom:4px}
.page-content .subtitle{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.5}
.step-list{display:flex;flex-direction:column;gap:14px;margin-bottom:28px}
.step{display:flex;gap:12px}
.step-num{
  width:26px;height:26px;border-radius:50%;background:rgba(52,131,250,.15);
  color:var(--accent);font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.step-body h3{font-size:13px;font-weight:600;margin-bottom:2px}
.step-body p{font-size:13px;color:var(--text2);line-height:1.5}
.step-body a{color:var(--accent)}
.code-block{
  background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);
  padding:12px;font-family:monospace;font-size:12px;color:var(--text2);
  white-space:pre-wrap;word-break:break-all;margin:8px 0;
}
.section-hd{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;margin-top:20px}
.glossary-table{width:100%;border-collapse:collapse}
.glossary-table tr{border-bottom:1px solid var(--border)}
.glossary-table td{padding:10px 6px;font-size:13px;vertical-align:top}
.glossary-table td:first-child{color:var(--text);font-weight:500;width:160px;white-space:nowrap}
.glossary-table td:last-child{color:var(--text2);line-height:1.5}
.settings-block{
  background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);
  padding:16px;margin-bottom:16px;
}
.settings-block h3{font-size:13px;font-weight:600;margin-bottom:10px}
.sync-status{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;margin-top:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sync-dot.ok{background:var(--best)}
.sync-dot.err{background:var(--red)}
.sync-dot.busy{background:var(--yellow);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── COUNT BADGE ─────────────────────────────────────────────────── */
.prod-count{font-size:11px;color:var(--text2);white-space:nowrap}
.prod-count b{color:var(--accent)}

/* ── TOAST ───────────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);
  padding:9px 18px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.5);
  transition:transform .3s ease;z-index:999;white-space:nowrap;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--best);color:var(--best)}
.toast.err{border-color:var(--red);color:var(--red)}

/* ── RESPONSIVE ──────────────────────────────────────────────────── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
@media(max-width:780px){
  .sidebar{transform:translateX(-100%);transition:transform .25s;position:fixed}
  .sidebar.open{transform:translateX(0)}
  .sidebar.open~.sidebar-overlay{display:block}
  .main{margin-left:0}
  .btn-hamburger{display:block}
  #content{padding:14px}
  .topbar{padding:10px 14px}
}
@media(max-width:480px){
  .filter-group{display:none}
  .modal{padding:16px}
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<!-- ── SIDEBAR ───────────────────────────────────────────────────── -->
<aside class="sidebar" id="sidebar">
  <div class="sb-header">
    <div class="sb-logo">
      <div class="logo">ML</div>
      <span class="brand">Veredicto</span>
    </div>
    <button class="btn-theme" id="btn-theme" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
  </div>

  <div class="sb-user" id="sb-user">
    <button class="btn btn-secondary btn-sm" onclick="openModal('modal-login')" style="width:100%">Iniciar sesión</button>
  </div>

  <div class="sb-section" id="projects-section">
    <div class="sb-section-hd">
      <span>Mis comparaciones</span>
      <button class="btn-new-proj" onclick="openModal('modal-new-project')" title="Nueva comparación">+</button>
    </div>
    <div id="project-list"></div>
  </div>

  <div class="sb-nav">
    <button class="nav-item" onclick="setView('instrucciones')">📖 Instrucciones</button>
    <button class="nav-item" onclick="setView('glosario')">📚 Glosario</button>
  </div>

  <div class="sb-footer">
    <button class="nav-item" onclick="setView('ajustes')">⚙️ Ajustes</button>
  </div>
</aside>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- ── MAIN ──────────────────────────────────────────────────────── -->
<main class="main">
  <div class="topbar" id="topbar">
    <div class="topbar-left">
      <button class="btn-hamburger" onclick="toggleSidebar()">☰</button>
      <h1 class="topbar-title" id="topbar-title">Veredicto</h1>
    </div>
    <div class="topbar-right" id="topbar-right"></div>
  </div>
  <div id="content"></div>
</main>

<!-- ── MODAL: LOGIN ───────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-login">
  <div class="modal modal-sm">
    <div class="modal-hd">
      <h2 id="login-title">Iniciar sesión</h2>
      <button class="btn-close" onclick="closeModal('modal-login')">✕</button>
    </div>
    <div class="tabs-hd">
      <button class="tab-btn active" onclick="switchLoginTab('login')">Entrar</button>
      <button class="tab-btn" onclick="switchLoginTab('register')">Crear cuenta</button>
    </div>
    <div class="tab-panel active" id="tab-login">
      <div class="frow"><label>Email</label><input type="email" id="login-email" placeholder="tu@email.com"></div>
      <div class="frow"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••••"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="doLogin()">Entrar</button>
    </div>
    <div class="tab-panel" id="tab-register">
      <div class="frow"><label>Email</label><input type="email" id="reg-email" placeholder="tu@email.com"></div>
      <div class="frow"><label>Contraseña</label><input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="doRegister()">Crear cuenta</button>
    </div>
    <div class="status-msg" id="login-status"></div>
    <div style="margin-top:12px;text-align:center">
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="closeModal('modal-login')">Continuar sin cuenta (solo local)</button>
    </div>
  </div>
</div>

<!-- ── MODAL: NUEVO PROYECTO ─────────────────────────────────────── -->
<div class="modal-overlay" id="modal-new-project">
  <div class="modal modal-sm">
    <div class="modal-hd">
      <h2>Nueva comparación</h2>
      <button class="btn-close" onclick="closeModal('modal-new-project')">✕</button>
    </div>
    <div class="frow">
      <label>Nombre</label>
      <input type="text" id="new-proj-name" placeholder="ej: Pavas eléctricas, Laptops...">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="createProject()">Crear</button>
  </div>
</div>

<!-- ── MODAL: AGREGAR PRODUCTO ────────────────────────────────────── -->
<div class="modal-overlay" id="modal-add-product">
  <div class="modal modal-md">
    <div class="modal-hd">
      <h2>Agregar producto</h2>
      <button class="btn-close" onclick="closeModal('modal-add-product')">✕</button>
    </div>
    <div class="tabs-hd">
      <button class="tab-btn active" onclick="switchAddTab('url')">Por link de ML</button>
      <button class="tab-btn" onclick="switchAddTab('manual')">Manual</button>
    </div>

    <!-- TAB: URL -->
    <div class="tab-panel active" id="tab-url">
      <div class="frow">
        <label>Pegá el link del producto en MercadoLibre</label>
        <input type="text" id="add-url" placeholder="https://www.mercadolibre.com.ar/pava-oster-MLA123456...">
        <div class="hint">Funciona con cualquier URL de mercadolibre.com.ar que tenga un código MLA en la dirección.</div>
      </div>
      <button class="btn btn-primary" onclick="fetchByUrl()">🔍 Buscar producto</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let projects = [];
let products = {};   // { [projectId]: [...] }
let currentProjectId = null;
let currentView = 'compare';
let filterMin = null, filterMax = null;
let hiddenProductIds = new Set();
let hiddenSpecs = new Set();
let specFilter = '';
let hideIdentical = false;
let darkMode = localStorage.getItem('vrd_dark') !== 'false';
let sb = null;
let sbUser = null;
let urlPendingProduct = null;

const LS_PROJECTS = 'vrd_projects';
const LS_PRODUCTS = 'vrd_products';
const LS_PROJECT  = 'vrd_current_project';
const LS_SB_URL   = 'vrd_sb_url';
const LS_SB_KEY   = 'vrd_sb_key';

const DEFAULT_SB_URL = 'https://tjsoqcdyfvvgusaruwqa.supabase.co';
const DEFAULT_SB_KEY = 'sb_publishable_Z6g4MPrRBdht_EqT-k1Vow_r7PB1rXc';

const ML_PROXY = 'https://veredicto-ml-proxy.mlairion.workers.dev';

// ══════════════════════════════════════════════════════
// LOCAL STORAGE
// ══════════════════════════════════════════════════════
function loadLocal() {
  try { projects = JSON.parse(localStorage.getItem(LS_PROJECTS)) || []; } catch { projects = []; }
  try { products = JSON.parse(localStorage.getItem(LS_PRODUCTS)) || {}; } catch { products = {}; }
  currentProjectId = localStorage.getItem(LS_PROJECT) || null;
  if (currentProjectId && !projects.find(p => p.id === currentProjectId)) currentProjectId = null;
  if (!currentProjectId && projects.length) currentProjectId = projects[0].id;
}
function saveLocal() {
  localStorage.setItem(LS_PROJECTS, JSON.stringify(projects));
  localStorage.setItem(LS_PRODUCTS, JSON.stringify(products));
  if (currentProjectId) localStorage.setItem(LS_PROJECT, currentProjectId);
}

// ══════════════════════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════════════════════
function initSupabase() {
  const url = localStorage.getItem(LS_SB_URL) || DEFAULT_SB_URL;
  const key = localStorage.getItem(LS_SB_KEY) || DEFAULT_SB_KEY;
  if (url && key && window.supabase) {
    try { sb = window.supabase.createClient(url, key); } catch(e) { sb = null; }
  }
}

async function sbLogin(email, password) {
  if (!sb) throw new Error('Supabase no configurado. Configuralo en Ajustes primero.');
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) throw new Error(error.message);
  return data.user;
}

async function sbRegister(email, password) {
  if (!sb) throw new Error('Supabase no configurado. Configuralo en Ajustes primero.');
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) throw new Error(error.message);
  return data.user;
}

async function sbLogout() {
  if (sb) await sb.auth.signOut();
  sbUser = null;
  renderUserZone();
  showToast('Sesión cerrada');
}

async function sbSync(direction = 'push') {
  if (!sb || !sbUser) return;
  setSyncStatus('busy', 'Sincronizando...');
  try {
    if (direction === 'pull') {
      const { data } = await sb.from('veredicto_data').select('data').eq('user_id', sbUser.id).single();
      if (data?.data) {
        projects = data.data.projects || [];
        products = data.data.products || {};
        if (!currentProjectId && projects.length) currentProjectId = projects[0].id;
        saveLocal();
      }
    } else {
      await sb.from('veredicto_data').upsert({
        user_id: sbUser.id,
        data: { projects, products },
        updated_at: new Date().toISOString()
      });
    }
    setSyncStatus('ok', 'Sincronizado');
  } catch(e) {
    setSyncStatus('err', 'Error al sincronizar');
  }
}

function setSyncStatus(state, msg) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.querySelector('.sync-dot').className = 'sync-dot ' + state;
  el.querySelector('.sync-msg').textContent = msg;
}

// ══════════════════════════════════════════════════════
// ML API
// ══════════════════════════════════════════════════════
function extractMlaId(url) {
  const m = url.match(/MLA-?(\d+)/i);
  return m ? 'MLA' + m[1] : null;
}

async function fetchMLProduct(url) {
  // Catalog page: mercadolibre.com.ar/p/MLA123
  const catalogMatch = url.match(/\/p\/(MLA\d+)/i);
  // Regular listing: MLA123456789 in path
  const itemMatch = url.match(/[/\-](MLA[\d]+)(?:[_\-#?]|$)/i) || url.match(/\b(MLA\d{6,})\b/i);

  if (!catalogMatch && !itemMatch) {
    throw new Error('No encontré un código de producto (MLA...) en esa URL.');
  }

  const specs = {};
  const extractSpecs = attrs => (attrs || []).forEach(a => {
    if (a.value_name && a.value_name !== 'N/A') specs[a.name] = a.value_name;
  });

  if (catalogMatch) {
    // Products API (catalog pages)
    const id = catalogMatch[1].toUpperCase();
    const resp = await fetch(`${ML_PROXY}/products/${id}`);
    if (!resp.ok) throw new Error('Producto no encontrado. Verificá el link.');
    const item = await resp.json();

    extractSpecs(item.attributes);
    const photos = (item.pictures || [])
      .map(p => p.url || p.secure_url || '').filter(s => s.startsWith('http')).slice(0, 6);
    let price = item.buy_box_winner?.price || item.buy_box_winner?.listing_price || item.price || null;
    // fallback: fetch first child item for price
    if (!price) {
      try {
        const ir = await fetch(`${ML_PROXY}/products/${id}/items?limit=1`);
        if (ir.ok) {
          const idata = await ir.json();
          const firstId = (idata.results || [])[0];
          if (firstId) {
            const pr = await fetch(`${ML_PROXY}/items/${firstId}`);
            if (pr.ok) { const pd = await pr.json(); price = pd.price || null; }
          }
        }
      } catch {}
    }
    const rating = item.reviews?.rating_average ? String(item.reviews.rating_average.toFixed(1)) : null;
    const reviews = item.reviews?.total ? String(item.reviews.total) : null;

    return { id, title: item.name, price, rating, reviews, specs, photos, link: url, addedAt: new Date().toISOString() };

  } else {
    // Items API (regular listings)
    const id = itemMatch[1].toUpperCase();
    const resp = await fetch(`${ML_PROXY}/items/${id}`);
    if (!resp.ok) throw new Error('Producto no encontrado. Verificá el link.');
    const item = await resp.json();

    extractSpecs(item.attributes);
    const photos = (item.pictures || [])
      .map(p => p.secure_url || p.url || '').filter(s => s.startsWith('http')).slice(0, 6);
    if (!photos.length && item.thumbnail) photos.push(item.thumbnail.replace('-I.jpg', '-O.jpg'));

    let rating = null, reviews = null;
    try {
      const rr = await fetch(`${ML_PROXY}/reviews/item/${id}`);
      if (rr.ok) {
        const rd = await rr.json();
        if (rd.rating_average) rating = rd.rating_average.toFixed(1);
        if (rd.paging?.total) reviews = String(rd.paging.total);
      }
    } catch {}

    return { id, title: item.title, price: item.price, rating, reviews, specs, photos, link: item.permalink || url, addedAt: new Date().toISOString() };
  }
}

// ══════════════════════════════════════════════════════
// PROJECTS
// ══════════════════════════════════════════════════════
function createProject() {
  const name = document.getElementById('new-proj-name').value.trim();
  if (!name) return;
  const id = 'p' + Date.now();
  projects.push({ id, name, createdAt: new Date().toISOString() });
  products[id] = [];
  currentProjectId = id;
  saveLocal();
  sbSync('push');
  closeModal('modal-new-project');
  document.getElementById('new-proj-name').value = '';
  setView('compare');
}

function selectProject(id) {
  currentProjectId = id;
  localStorage.setItem(LS_PROJECT, id);
  setView('compare');
  if (window.innerWidth <= 780) closeSidebar();
}

function deleteProject(id) {
  if (!confirm('¿Eliminar esta comparación y todos sus productos?')) return;
  projects = projects.filter(p => p.id !== id);
  delete products[id];
  if (currentProjectId === id) currentProjectId = projects[0]?.id || null;
  saveLocal();
  sbSync('push');
  renderAll();
}

function addProductToProject(product) {
  if (!currentProjectId) {
    showToast('Creá una comparación primero', 'err');
    return false;
  }
  if (!products[currentProjectId]) products[currentProjectId] = [];
  const exists = products[currentProjectId].findIndex(p => p.id === product.id);
  if (exists >= 0) {
    showToast('Este producto ya está en la comparación', 'err');
    return false;
  } else {
    products[currentProjectId].push(product);
    showToast('Producto agregado ✓', 'ok');
  }
  saveLocal();
  sbSync('push');
  return true;
}

function removeProductFromProject(productId) {
  if (!currentProjectId || !products[currentProjectId]) return;
  products[currentProjectId] = products[currentProjectId].filter(p => p.id !== productId);
  saveLocal();
  sbSync('push');
  renderContent();
}

// ══════════════════════════════════════════════════════
// ADD PRODUCT ACTIONS
// ══════════════════════════════════════════════════════
async function fetchByUrl() {
  const url = document.getElementById('add-url').value.trim();
  const status = document.getElementById('url-status');
  const preview = document.getElementById('url-preview');
  const btnAdd = document.getElementById('btn-add-url');
  status.className = 'status-msg';
  status.textContent = 'Buscando...';
  preview.style.display = 'none';
  btnAdd.style.display = 'none';
  urlPendingProduct = null;

  try {
    const p = await fetchMLProduct(url);
    urlPendingProduct = p;
    document.getElementById('pcard-title').textContent = p.title || '';
    document.getElementById('pcard-price').textContent = p.price ? formatPrice(p.price) : '';
    document.getElementById('pcard-rating').textContent =
      p.rating ? `★ ${p.rating}${p.reviews ? ` · ${p.reviews} opiniones` : ''}` : '';
    const specEntries = Object.entries(p.specs).slice(0, 8);
    document.getElementById('pcard-specs').innerHTML = specEntries
      .map(([k,v]) => `${k}: <span>${esc(v)}</span>`).join(' · ');
    preview.style.display = 'block';
    btnAdd.style.display = 'block';
    status.className = 'status-msg ok';
    status.textContent = `✓ ${Object.keys(p.specs).length} especificaciones encontradas`;
  } catch(e) {
    status.className = 'status-msg err';
    status.textContent = '✕ ' + e.message;
  }
}

function addFromUrl() {
  if (!urlPendingProduct) return;
  if (addProductToProject(urlPendingProduct)) {
    closeModal('modal-add-product');
    document.getElementById('add-url').value = '';
    document.getElementById('url-preview').style.display = 'none';
    document.getElementById('btn-add-url').style.display = 'none';
    document.getElementById('url-status').textContent = '';
    urlPendingProduct = null;
    renderContent();
  }
}

function addManual() {
  const title = document.getElementById('m-title').value.trim();
  const status = document.getElementById('manual-status');
  if (!title) { status.className = 'status-msg err'; status.textContent = 'El nombre es obligatorio'; return; }

  const specsRaw = document.getElementById('m-specs').value.trim();
  const specs = {};
  specsRaw.split('\n').forEach(line => {
    const idx = line.indexOf(':');
    if (idx > 0) {
      const k = line.slice(0, idx).trim();
      const v = line.slice(idx + 1).trim();
      if (k && v) specs[k] = v;
    }
  });

  const product = {
    id: 'manual_' + Date.now(),
    title,
    price: parseFloat(document.getElementById('m-price').value) || null,
    rating: document.getElementById('m-rating').value || null,
    reviews: document.getElementById('m-reviews').value || null,
    specs,
    photos: [],
    link: document.getElementById('m-link').value.trim() || null,
    addedAt: new Date().toISOString()
  };

  if (addProductToProject(product)) {
    closeModal('modal-add-product');
    ['m-title','m-price','m-link','m-rating','m-reviews','m-specs'].forEach(id => {
      document.getElementById(id).value = '';
    });
    renderContent();
  }
}

// ══════════════════════════════════════════════════════
// LOGIN ACTIONS
// ══════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function renderAll() {
  renderSidebar();
  renderContent();
}

function renderSidebar() {
  renderUserZone();
  renderProjectList();
}

function renderUserZone() {
  const el = document.getElementById('sb-user');
  if (sbUser) {
    const email = sbUser.email || '';
    const initial = email[0]?.toUpperCase() || '?';
    el.innerHTML = `<div class="user-info">
      <div class="user-avatar">${initial}</div>
      <span class="user-email" title="${esc(email)}">${esc(email)}</span>
      <button class="btn-logout" onclick="sbLogout()">Salir</button>
    </div>`;
  } else {
    el.innerHTML = `<button class="btn btn-secondary btn-sm" onclick="openModal('modal-login')" style="width:100%">Iniciar sesión</button>`;
  }
}

function renderProjectList() {
  const el = document.getElementById('project-list');
  if (!projects.length) {
    el.innerHTML = `<div style="padding:8px 14px;font-size:12px;color:var(--text3)">Sin comparaciones aún</div>`;
    return;
  }
  el.innerHTML = projects.map(p => {
    const prods = products[p.id] || [];
    const count = prods.length;
    const active = p.id === currentProjectId && currentView === 'compare';
    const isOpen = active && count > 0;
    const prodList = prods.map(prod => {
      const visible = !hiddenProductIds.has(prod.id);
      const name = (prod.title || 'Sin nombre').slice(0, 28) + ((prod.title||'').length > 28 ? '…' : '');
      return `<label class="proj-prod-item">
        <input type="checkbox" ${visible ? 'checked' : ''} onchange="toggleProductVisibility('${prod.id}')">
        ${esc(name)}
      </label>`;
    }).join('');
    return `<div>
      <div class="proj-item ${active ? 'active' : ''}" onclick="selectProject('${p.id}')">
        <span class="proj-name">${esc(p.name)}</span>
        <span class="proj-count">${count}</span>
        ${count > 0 ? `<span class="proj-chevron ${isOpen?'open':''}" onclick="event.stopPropagation();toggleProjExpand(this)">▶</span>` : ''}
      </div>
      ${count > 0 ? `<div class="proj-products ${isOpen?'open':''}">${prodList}</div>` : ''}
    </div>`;
  }).join('');
}

function toggleProjExpand(chevron) {
  chevron.classList.toggle('open');
  const products_el = chevron.closest('.proj-item').nextElementSibling;
  if (products_el) products_el.classList.toggle('open');
}

function setView(view) {
  currentView = view;
  renderContent();
  renderProjectList();
  // Highlight nav items
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.remove('active');
    if (el.textContent.toLowerCase().includes(view)) el.classList.add('active');
  });
}

function renderContent() {
  const title = document.getElementById('topbar-title');
  const right  = document.getElementById('topbar-right');
  const content = document.getElementById('content');

  if (currentView === 'compare') {
    const proj = projects.find(p => p.id === currentProjectId);
    title.textContent = proj ? proj.name : 'Veredicto';
    const prods = getVisibleProducts();
    const all   = (products[currentProjectId] || []);

    right.innerHTML = `
      <div class="filter-group">
        <label>Precio</label>
        <input class="filter-input" id="price-min" type="number" placeholder="mín" value="${filterMin||''}">
        <span class="filter-sep">—</span>
        <input class="filter-input" id="price-max" type="number" placeholder="máx" value="${filterMax||''}">
        <button class="btn btn-primary btn-sm" onclick="applyFilter()">Filtrar</button>
      </div>
      <div class="filter-group">
        <label>Specs</label>
        <input class="filter-input" id="spec-filter" type="search" placeholder="buscar..." value="${esc(specFilter)}" autocomplete="off" style="width:90px">
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap">
          <input type="checkbox" ${hideIdentical?'checked':''} onchange="hideIdentical=this.checked;renderContent()"> Ocultar iguales
        </label>
      </div>
      ${all.length ? `<span class="prod-count"><b>${prods.length}</b>/${all.length}</span>` : ''}
      ${currentProjectId ? `<button class="btn btn-primary btn-sm" onclick="openModal('modal-add-product')">+ Agregar</button>` : ''}
    `;

    if (!projects.length) {
      content.innerHTML = renderEmpty(
        '📦', 'Creá tu primera comparación',
        'Hacé clic en el <strong>+</strong> de la barra lateral para empezar.',
        `<button class="btn btn-primary" onclick="openModal('modal-new-project')">+ Nueva comparación</button>`
      );
    } else if (!all.length) {
      content.innerHTML = renderEmpty(
        '🔍', 'Esta comparación está vacía',
        'Agregá productos desde MercadoLibre para empezar a comparar.',
        `<button class="btn btn-primary" onclick="openModal('modal-add-product')">+ Agregar producto</button>`
      );
    } else if (!prods.length) {
      content.innerHTML = renderEmpty('🔍', 'Ningún producto en ese rango de precio', 'Ajustá el filtro para ver más resultados.');
    } else {
      content.innerHTML = `<div class="cmp-wrap">${renderTable(prods)}</div>`;
    }

    // Bind filter enter keys
    ['price-min','price-max'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('keydown', e => { if(e.key==='Enter') applyFilter(); });
    });
    const sf = document.getElementById('spec-filter');
    if (sf) sf.addEventListener('input', e => { specFilter = e.target.value; renderContent(); });

  } else if (currentView === 'instrucciones') {
    title.textContent = 'Instrucciones';
    right.innerHTML = '';
    content.innerHTML = renderInstrucciones();
  } else if (currentView === 'glosario') {
    title.textContent = 'Glosario';
    right.innerHTML = '';
    content.innerHTML = renderGlosario();
  } else if (currentView === 'ajustes') {
    title.textContent = 'Ajustes';
    right.innerHTML = '';
    content.innerHTML = renderAjustes();
  }
}

// ══════════════════════════════════════════════════════
// COMPARISON TABLE
// ══════════════════════════════════════════════════════
function getVisibleProducts() {
  const all = products[currentProjectId] || [];
  if (filterMin == null && filterMax == null) return all;
  return all.filter(p => {
    const price = p.price;
    if (filterMin != null && price < filterMin) return false;
    if (filterMax != null && price > filterMax) return false;
    return true;
  });
}

function applyFilter() {
  const minV = document.getElementById('price-min')?.value;
  const maxV = document.getElementById('price-max')?.value;
  filterMin = minV ? parseFloat(minV) : null;
  filterMax = maxV ? parseFloat(maxV) : null;
  renderContent();
}

function toggleProductVisibility(id) {
  if (hiddenProductIds.has(id)) hiddenProductIds.delete(id);
  else hiddenProductIds.add(id);
  renderContent();
}

function toggleSpec(key) {
  if (hiddenSpecs.has(key)) hiddenSpecs.delete(key);
  else hiddenSpecs.add(key);
  renderContent();
}

function toggleTheme() {
  darkMode = !darkMode;
  localStorage.setItem('vrd_dark', darkMode);
  applyTheme();
}

function applyTheme() {
  document.body.classList.toggle('light', !darkMode);
  const btn = document.getElementById('btn-theme');
  if (btn) btn.textContent = darkMode ? '🌙' : '☀️';
}

function renderTable(prods) {
  // Only show visible products
  const visProds = prods.filter(p => !hiddenProductIds.has(p.id));
  if (!visProds.length) return `<div style="padding:40px;text-align:center;color:var(--text3);font-size:13px">Todos los productos están ocultos. Activalos desde el panel lateral.</div>`;

  const specKeys = [];
  const seen = new Set();
  visProds.forEach(p => Object.keys(p.specs||{}).forEach(k => { if(!seen.has(k)){seen.add(k);specKeys.push(k);} }));
  const filteredSpecKeys = specKeys.filter(k => {
    if (specFilter && !k.toLowerCase().includes(specFilter.toLowerCase())) return false;
    if (hideIdentical) {
      const vals = visProds.map(p => (p.specs||{})[k] || null);
      if (vals.length > 1 && vals.every(v => v === vals[0] && v != null)) return false;
    }
    return true;
  });

  const prices = visProds.map(p => p.price).filter(n => n != null);
  const minPrice = prices.length ? Math.min(...prices) : null;
  const maxPrice = prices.length > 1 ? Math.max(...prices) : null;
  const ratings  = visProds.map(p => parseFloat(p.rating)).filter(n => !isNaN(n));
  const maxRating = ratings.length ? Math.max(...ratings) : null;

  let h = `<table class="cmp-table"><thead><tr>`;
  h += `<th class="col-spec hd">Característica</th>`;
  visProds.forEach(p => {
    const isMin = p.price != null && p.price === minPrice && prices.length > 1;
    const isMax = p.price != null && p.price === maxPrice && prices.length > 1;
    const rVal  = parseFloat(p.rating);
    const isBestR = !isNaN(rVal) && rVal === maxRating && ratings.length > 1;
    const img = (p.photos && p.photos[0])
      ? `<img class="product-img" src="${esc(p.photos[0])}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="product-img-ph" style="display:none">📦</div>`
      : `<div class="product-img-ph">📦</div>`;
    h += `<th class="col-product">
      <div class="product-header">
        ${img}
        <div class="product-name">${esc(p.title||'Sin nombre')}</div>
        <div class="product-price ${isMin?'best':isMax?'worst':''}">${p.price != null ? formatPrice(p.price) : '—'}${isMin?` <span style="font-size:10px;font-weight:400">✓ mejor</span>`:''}</div>
        ${p.rating ? `<div class="product-rating"><span class="star">★</span><b>${esc(p.rating)}</b>${p.reviews?` (${esc(p.reviews)})`:''}${isBestR?' <span style="color:var(--best);font-size:10px">✓</span>':''}</div>` : ''}
        <div class="product-actions">
          ${p.link ? `<a class="btn-link" href="${esc(p.link)}" target="_blank">Ver en ML</a>` : ''}
          <button class="btn-remove" onclick="removeProductFromProject('${esc(p.id)}')">Quitar</button>
        </div>
      </div>
    </th>`;
  });
  h += `</tr></thead><tbody>`;

  // Price row
  h += `<tr class="row-key"><td class="col-spec">Precio</td>`;
  visProds.forEach(p => {
    const isBest = p.price != null && p.price === minPrice && prices.length > 1;
    h += `<td class="col-value ${isBest?'best-val':''}">${p.price != null ? formatPrice(p.price) : '<span class="empty">—</span>'}</td>`;
  });
  h += `</tr>`;

  // Rating row
  if (ratings.length) {
    h += `<tr class="row-key"><td class="col-spec">Rating</td>`;
    visProds.forEach(p => {
      const r = parseFloat(p.rating);
      const isBest = !isNaN(r) && r === maxRating && ratings.length > 1;
      h += `<td class="col-value ${isBest?'best-val':''}">${p.rating ? `★ ${esc(p.rating)}${p.reviews?` (${esc(p.reviews)})`:''}`:'<span class="empty">—</span>'}</td>`;
    });
    h += `</tr>`;
  }

  // Specs
  if (filteredSpecKeys.length) {
    h += `<tr class="row-sep"><td colspan="${visProds.length+1}">Especificaciones técnicas</td></tr>`;
    filteredSpecKeys.forEach(key => {
      const vals = visProds.map(p => (p.specs||{})[key] || null);
      if (vals.every(v => v == null)) return;
      const hidden = hiddenSpecs.has(key);
      const allSame = !hidden && vals.every(v => v === vals[0]) && vals[0] != null;
      const keyEsc = esc(key).replace(/'/g, "\\'");
      h += `<tr style="${hidden?'opacity:.4':''}">
        <td class="col-spec">
          <div style="display:flex;align-items:center;gap:6px">
            <input type="checkbox" ${hidden?'':'checked'} onchange="toggleSpec('${keyEsc}')" style="accent-color:var(--accent);flex-shrink:0;cursor:pointer">
            ${esc(key)}
          </div>
        </td>`;
      vals.forEach(v => {
        h += `<td class="col-value ${allSame?'muted':''}">${!hidden && v ? esc(v) : '<span class="empty">—</span>'}</td>`;
      });
      h += `</tr>`;
    });
  }

  h += `</tbody></table>`;
  return h;
}

// ══════════════════════════════════════════════════════
// SETTINGS ACTIONS
// ══════════════════════════════════════════════════════
function saveSupabaseConfig() {
  const url = document.getElementById('sb-url-input').value.trim();
  const key = document.getElementById('sb-key-input').value.trim();
  localStorage.setItem(LS_SB_URL, url);
  localStorage.setItem(LS_SB_KEY, key);
  initSupabase();
  showToast('Configuración guardada', 'ok');
  renderContent();
}

function exportData() {
  const blob = new Blob([JSON.stringify({ projects, products }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `veredicto_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.projects) projects = data.projects;
      if (data.products) products = data.products;
      if (!currentProjectId && projects.length) currentProjectId = projects[0].id;
      saveLocal();
      renderAll();
      showToast('Datos importados ✓', 'ok');
    } catch {
      showToast('Archivo inválido', 'err');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function clearAllData() {
  if (!confirm('¿Borrar todas las comparaciones y productos? Esta acción no se puede deshacer.')) return;
  projects = []; products = {}; currentProjectId = null;
  saveLocal();
  renderAll();
  showToast('Datos eliminados');
}

// ══════════════════════════════════════════════════════
// HASH IMPORT (from extension)
// ══════════════════════════════════════════════════════
function checkHash() {
  if (!location.hash.startsWith('#import=')) return;
  try {
    const p = JSON.parse(decodeURIComponent(location.hash.slice(8)));
    if (p?.title) {
      if (!currentProjectId) {
        const id = 'p' + Date.now();
        projects.push({ id, name: 'Sin nombre', createdAt: new Date().toISOString() });
        products[id] = [];
        currentProjectId = id;
      }
      addProductToProject(p);
    }
  } catch {}
  history.replaceState(null, '', location.pathname);
  renderAll();
}

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
function formatPrice(n) {
  if (n == null) return '—';
  return '$ ' + Number(n).toLocaleString('es-AR');
}

function esc(v) {
  if (v == null) return '';
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderEmpty(icon, title, desc, extra='') {
  return `<div class="empty"><div class="empty-icon">${icon}</div><h2>${title}</h2><p>${desc}</p>${extra}</div>`;
}

let toastTimer = null;
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2600);
}

// ══════════════════════════════════════════════════════
// MODAL & SIDEBAR HELPERS
// ══════════════════════════════════════════════════════
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function switchAddTab(tab) {
  ['url','manual'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  document.querySelectorAll('#modal-add-product .tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&tab==='url')||(i===1&&tab==='manual'));
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// Enter key on new project
document.getElementById('new-proj-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') createProject();
});

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
async function init() {
  applyTheme();
  loadLocal();
  initSupabase();
  if (sb) {
    const { data } = await sb.auth.getSession();
    sbUser = data?.session?.user || null;
    if (sbUser) sbSync('pull');
  }
  checkHash();
  renderAll();
}

init();
</script>
